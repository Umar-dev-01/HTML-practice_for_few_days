<!DOCTYPE html>
<html>
<head>
  <title>Final Layout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body{
      margin: 0;
      font-family: Arial;
      background: #eee;
    }
    .container{
      max-width: 1100px;
      margin: auto;
      padding: 15px;
    }
.navbar{
      background: #ccc;
      padding: 32px 40px;
      border-radius: 8px;
      margin-bottom: 32px;
    }
    .nav-inner{
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo{
      width: 161px;
      height: 68px;
      background: black;
    }
    .nav-btn{
      width: 269px;
      height: 68px;
      background: black;
      border-radius: 999px;
    }
    .section{
      background: #ccc;
      border-radius: 6px;
      height: 144px;
      margin-bottom: 20px;
    }
    .center-btn{
      width: 269px;
      height: 68px;
      margin: 30px auto;
      background: black;
      border-radius: 999px;
    }
 .two-cards{
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
  .card{
      flex: 1;
      height: 340px;
      background: #ccc;
      border-radius: 55px;
    }
 .three-cards{
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
 .small-card{
      flex: 1;
      background: #ccc;
      border-radius: 24px;
      padding: 20px;
    }
.circle{
      width: 123px;
      height: 123px;
      background: black;
      border-radius: 50%;
      margin-bottom: 15px;
    }
.rect-box{
      height: 171px;
      background: black;
      border-radius: 10px;
    }
 .big-box{
      height: 400px;
      background: black;
      border-radius: 66px;
      margin-bottom: 30px;
    }
.bottom{
      display: flex;
      gap: 20px;
    }
 .left-box{
      width: 30%;
      height: 340px;
      background: black;
      border-radius: 10px;
    }
 .right{
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
 .line{
      height: 58px;
      background: black;
      border-radius: 4px;
    }

    @media (max-width: 900px){
.container{
        max-width: 800px;
      }
 .nav-inner{
        flex-direction: row;
        align-items: flex-start;
      }
 .two-cards{
        flex-direction: column;
      }
 .three-cards{
        flex-direction: column;
      }
 .small-card{
        width: 100%;
      }
 .bottom{
        flex-direction: column;
      }
 .left-box{
        width: 100%;
      }
.right{
        grid-template-columns: repeat(2, 1fr);
      }}

    
    @media (max-width: 436px){

      .container{
        padding: 10px;
      }
.nav-inner{
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
.logo{
        width: 120px;
        height: 50px;
      }
 .nav-btn{
        width: 100%;
        height: 50px;
      }
.center-btn{
        width: 100%;
        height: 50px;
      }
.card{
        height: 250px;
      }
 .small-card{
        padding: 15px;
      }
.circle{
        width: 90px;
        height: 90px;
      }
.rect-box{
        height: 120px;
      }
 .big-box{
        height: 250px;
        border-radius: 30px;
      }
.right{
        grid-template-columns: 1fr;
      }
 .line{
        height: 40px;
      }}

  </style>
</head>

<body>

<div class="container">

  <nav class="navbar">
    <div class="nav-inner">
      <div class="logo"></div>
      <div class="nav-btn"></div>
    </div>
  </nav>

  <div class="section"></div>
  <div class="section"></div>

  <div class="center-btn"></div>

  <div class="two-cards">
    <div class="card"></div>
    <div class="card"></div>
  </div>

  <div class="three-cards">
    <div class="small-card">
      <div class="circle"></div>
      <div class="rect-box"></div>
    </div>

    <div class="small-card">
      <div class="circle"></div>
      <div class="rect-box"></div>
    </div>

    <div class="small-card">
      <div class="circle"></div>
      <div class="rect-box"></div>
    </div>
  </div>

  <div class="big-box"></div>

  <div class="bottom">
    <div class="left-box"></div>

    <div class="right">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>

      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>

      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>

      <div class="line"></div>
    </div>
  </div>

</div>

</body>
</html>
