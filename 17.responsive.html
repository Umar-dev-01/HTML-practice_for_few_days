<!DOCTYPE html>
<html>
<head>
    <title>Sign Up Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #000;
            overflow-x: hidden; /* prevents horizontal scrolling */
        }

        .main{
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .right{
            width: 50%;
            background: #111;
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .back{
            color: #3b5cff;
            font-size: 14px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        h1{
            color: #3b5cff;
            margin-bottom: 10px;
        }

        p{
            font-size: 13px;
            margin-bottom: 15px;
        }

        .row{
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        label{
            font-size: 12px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"]{
            width: 100%;
            height: 36px;
            padding: 8px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            margin-top: 4px;
        }

        .checkbox{
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            margin: 10px 0 15px;
        }

        .or{
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3b5cff;
            margin: 15px 0;
            font-size: 12px;
        }

        .or::before,
        .or::after{
            content: "";
            flex: 1;
            height: 1px;
            background-color: #3b5cff;
            margin: 0 10px;
        }

        .social-btn{
            width: 100%;
            height: 42px;
            border-radius: 25px;
            border: 1px solid #666;
            background: #222;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            cursor: pointer;
            text-decoration: none;
        }

        .social-btn img{
            width: 20px;
        }

        .bottom{
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
        }

        .bottom a{
            color: #3b5cff;
            text-decoration: none;
        }

        .left{
            width: 50%;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .left img{
            max-width: 80%;
            height: auto;
        }

        /* Mobile Responsive */
        @media (max-width: 768px){
            .main{
                flex-direction: column;
            }
            .right, .left{
                width: 100%;
                padding: 20px;
            }
            .row{
                flex-direction: column;
                gap: 5px;
            }
            .left img{
                margin-top: 20px;
                display: block;
                margin-left: auto;
                margin-right: auto;
            }.left{
  display: none;
}}
    </style>
</head>
<body>
    <div class="main">
        <!-- Form on top -->
        <div class="right">
            <div class="back">← Back</div>
            <h1>Sign Up</h1>
            <p>Create your FocusBox account</p>

            <div class="row">
                <div style="flex:1;">
                    <label>First Name</label>
                    <input type="text">
                </div>
                <div style="flex:1;">
                    <label>Last Name</label>
                    <input type="text">
                </div>
            </div>

            <label>Email</label>
            <input type="email">

            <label>Password</label>
            <input type="password">

            <label>Confirm Password</label>
            <input type="password">

            <div class="checkbox">
                <input type="checkbox" id="agree">
                <label for="agree">I agree to terms & policy</label>
            </div>

            <div class="or">
                <span>OR</span>
            </div>

            <a href="https://support.google.com/mail/answer/56256?hl=en" class="social-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">Continue with Google
            </a>

            <a href="https://www.facebook.com/login/" class="social-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">Continue with Facebook
            </a>

            <div class="bottom">
                Already have an account? <a href="#">Sign In</a>
            </div>
        </div>

        <!-- Image below form -->
        <div class="left">
            <img src="cartoon.png" alt="Sign Up Image">
        </div>
    </div>
</body>
</html>
